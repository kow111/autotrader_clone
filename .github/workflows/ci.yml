name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Fix Tailwind native binding on Linux (npm optional deps bug)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          node -e "require('@tailwindcss/oxide')" || npm install @tailwindcss/oxide-linux-x64-gnu --no-save

      - name: Build project
        run: npm run build

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test
